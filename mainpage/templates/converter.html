{% extends 'layout.html' %}
{% load static %}
{% block title %} JpgToPdf {% endblock %}
{% block style %}
    <!-- pdf-lib link -->
    <script src="https://unpkg.com/pdf-lib"></script>

    <!-- downloadjs unpkg link -->
    <script type="text/javascript" src="https://unpkg.com/downloadjs@1.4.7/download.js"></script>

<!-- font awesome icon link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <!-- css file link -->
    <link rel="stylesheet" type="text/css" href="/static/style/converter.css">
{% endblock %}
{% block content %}
    <!-- header for logo -->
    <h3>Замечание: </h3><pre><p>Пожалуйста загружайте файлы только формата <b>jpg</b></p></pre>
    <!-- nav bar -->
    <div class="nav">
        <span>
            <h3></h3>
        </span>
        <div>
            <button id="convertBtn" onclick={embedImages()} class="btn btn-3 hover-border-2">Сохранить как PDF</button>
            <input type="file" id="upload-file" onchange={encodeImageFileAsURL(this)} multiple accept="image/">
            <button id="upload-msg" class="btn btn-3 hover-border-2" style="display: none;">
                Загрузить файлы
            </button>
        </div>
    </div>

    <!-- input page -->
    <div class="input-page" id="input-page">
        <div class="choose-file">
            <div class="add-more-files">
                <div class="inp-container">
                    <input type="file" id="upload-file" onchange={encodeImageFileAsURL(this)} multiple accept="image/">
                    <h4 class="drop">Кликните или перетащите изображения сюда</h4>
                    <label for="upload-file" id="custom-file"></label>
                    <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" fill="currentColor" class="bi bi-filetype-jpg" viewBox="0 0 16 16">

                    </svg>
                </div>
            </div>
        </div>
    </div>
    <!-- pdf page -->
    <div class="pdf-page" id="pdf-page">
        <div class="vreate-pdf" id="create-pdf">

            <!-- this part of code is just to show the pdf page structure and will be removed once javascript file will be created -->
            <!-- <div class="file-item">
                <div class="modify">

                <div class="img-container">
                    <img src="" alt="img" id="img">
                </div>
                <p id="img-name">img-name</p>
            </div>
            <div class="add-more-file">
                <div class="inp-cont">
                    <input type="file" id="inp" multiple accept="image/">
                    <p><i class="fa fa-plus"></i></p>
                    <label for="inp">Add Files</label>
                </div>
            </div>-->

    </div>
{% endblock %}

</script>
